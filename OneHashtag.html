<!doctype html>
<html>
 <head>
  <script type="text/javascript"
   src="https://www.gstatic.com/charts/loader.js">
  </script>
  <script type="text/javascript">
   google.charts.load('current', {
    'packages': ['bar']
   });
   google.charts.setOnLoadCallback(drawStuff);
   
   function drawStuff() {
    var data = new google.visualization
     .arrayToDataTable([
      ['Hashtags', 'Percentage'],
      ["Art", 25],
      ["Music", 6.25],
      ["Simulation", 6.25],
      ["Debugme", 6.25],
      ['Story', 3.13],
      ['Games', 6.25]
     ]);
    var options = {
     title: '1 Hashtag',
     width: 900,
     legend: {
      position: 'none'
     },
     chart: {
      title: 'Percentage of projects that have only 1 hashtag',
      subtitle: 'How many projects have only one hashtag by percentage (excluding competition hashtags such as #trick21, #treat21, #hopnet .etc)'
     },
     bars: 'horizontal', // Required for Material Bar Charts.
     axes: {
      x: {
       0: {
        side: 'top',
        label: 'Percentage'
       } // Top x-axis.
      }
     },
     bar: {
      groupWidth: "90%"
     }
    };
    
    var chart = new google.charts.Bar(document
     .getElementById('top_x_div'));
    chart.draw(data, options);
   };
  </script>
 </head>
 <body>
  <h1>One Hashtag</h1>
  <div id="top_x_div"
   style="width: 900px; height: 500px;"></div>
 </body>
</html>
